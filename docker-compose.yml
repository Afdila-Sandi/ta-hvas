networks:
  hvas-net:
    driver: bridge

services:
  #nginx
  nginx-vue:
    image: nginx:alpine
    container_name: hvas-nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - hvas-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "--no-check-certificate",
          "https://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  #mqtt
  mosquitto:
    image: eclipse-mosquitto:1.6.15
    container_name: hvas-mqtt
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./backend/certs:/mosquitto/config/certs:ro
    networks:
      - hvas-net
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_sub",
          "-h",
          "localhost",
          "-p",
          "8000",
          "--cafile",
          "/mosquitto/config/certs/hvas.crt",
          "--insecure",
          "-t",
          "$$SYS/#",
          "-C",
          "1",
          "-i",
          "healthcheck",
          "-W",
          "5",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  #database
  postgres-auth:
    image: postgres:15-alpine
    container_name: hvas-db_auth
    restart: always
    env_file:
      - ./backend/auth-service/.env
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
      - ./backend/auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hvas-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-telemetry:
    image: postgres:15-alpine
    container_name: hvas-db_telemetry
    restart: always
    env_file:
      - ./backend/telemetry-service/.env
    volumes:
      - pgdata_telemetry:/var/lib/postgresql/data
      - ./backend/telemetry-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hvas-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  #auth-service
  auth-service:
    build: ./backend/auth-service
    container_name: hvas-auth
    restart: always
    env_file:
      - ./backend/auth-service/.env
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - hvas-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:5001/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  #telemetry-service
  telemetry-service:
    build: ./backend/telemetry-service
    container_name: hvas-telemetry
    restart: always
    env_file:
      - ./backend/telemetry-service/.env
    depends_on:
      postgres-telemetry:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - hvas-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:5002/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  #control-service
  control-service:
    build: ./backend/control-service
    container_name: hvas-control
    restart: always
    env_file:
      - ./backend/control-service/.env
    depends_on:
      mosquitto:
        condition: service_started
    networks:
      - hvas-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:5003/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  #api-gateway
  api-gateway:
    build: ./backend/api-gateway
    container_name: hvas-api-gateway
    restart: always
    expose:
      - "5000"
    depends_on:
      auth-service:
        condition: service_healthy
      telemetry-service:
        condition: service_healthy
      control-service:
        condition: service_healthy
    networks:
      - hvas-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:5000/health'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata_auth:
  pgdata_telemetry:
